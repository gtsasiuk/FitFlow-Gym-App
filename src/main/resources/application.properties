spring.application.name=fitflow-main-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Flyway
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Logging pattern
logging.pattern.console=%d{HH:mm:ss} [%X{transactionId:-no-txn}] %clr([%15.15t]){faint} %clr(%-5level) %clr(%logger{36}){faint} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Prometheus metrics
management.prometheus.metrics.export.enabled=true

management.info.env.enabled=true
info.app.name=FitFlow
info.app.description=Training management system
info.app.version=1.0-SNAPSHOT

# JWT configuration
jwt.secret=fitflow-dev-secret-key-for-local-testing-only-not-for-production
jwt.expiration=86400000