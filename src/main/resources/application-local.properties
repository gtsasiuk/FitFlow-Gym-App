server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitflow_local}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.show-sql=true
logging.level.com.training.fitflow=DEBUG

management.endpoints.web.exposure.include=health,info,metrics,prometheus,beans,env,mappings,configprops

jwt.secret=fitflow-local-secret-key-32-chars-min
jwt.expiration=86400000